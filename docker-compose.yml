services:
  db:
    image: postgres:latest
    container_name: universidad_postgres
    environment:
      POSTGRES_DB: dwsc
      POSTGRES_USER: estudiante
      POSTGRES_PASSWORD: estudiante
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
